services:
  postgres:
    image: postgres:16
    container_name: fridge-buddy-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_NAME}" ]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: fridge-buddy-app
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      CLAUDE_API_KEY: ${CLAUDE_API_KEY}
      JWT_SECRET: ${JWT_SECRET}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      APPS_IN_TOSS_API_BASE_URL: ${APPS_IN_TOSS_API_BASE_URL:-https://apps-in-toss-api.toss.im}
      APPS_IN_TOSS_MTLS_CERT_PATH: ${APPS_IN_TOSS_MTLS_CERT_PATH:-}
      APPS_IN_TOSS_MTLS_KEY_PATH: ${APPS_IN_TOSS_MTLS_KEY_PATH:-}
    volumes:
      - ../mTLS:/app/mtls:ro
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data: