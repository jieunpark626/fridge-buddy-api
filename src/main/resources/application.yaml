spring:
  application:
    name: fridge-buddy-server

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

logging:
  level:
    org.springframework.web.filter.CommonsRequestLoggingFilter: DEBUG
    com.fridgebuddy.fridge_buddy_server.common.config.ResponseLoggingFilter: DEBUG

claude:
  api:
    key: ${CLAUDE_API_KEY}

jwt:
  secret: ${JWT_SECRET}
  expiration-ms: 86400000  # 24시간

cookie:
  secure: ${COOKIE_SECURE:false}

# ── 토스 로그인 설정 ──────────────────────────────────────────
toss:
  api:
    base-url: ${APPS_IN_TOSS_API_BASE_URL:https://apps-in-toss-api.toss.im}
  mtls:
    # mTLS 인증서/키 PEM 파일 경로 (프로덕션 필수, 로컬 개발 시 비워도 됨)
    # 키는 반드시 PKCS8 형식이어야 합니다.
    # openssl pkcs8 -topk8 -nocrypt -in private.key -out private.pk8.pem
    cert-path: ${APPS_IN_TOSS_MTLS_CERT_PATH:}
    key-path: ${APPS_IN_TOSS_MTLS_KEY_PATH:}
